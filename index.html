<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Кто ты из героев Шрека?</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --text:#f3f6ff;
      --muted:#b8c2e0;
      --btn:#1b2a4a;
      --btnHover:#2a3f6a;
      --accent:#8bd450;
      --accent2:#ffd166;
      --radius:18px;
      --shadow:0 16px 50px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:
        radial-gradient(1000px 500px at 10% 0%, rgba(139,212,80,.12), transparent 60%),
        radial-gradient(900px 500px at 100% 20%, rgba(255,209,102,.10), transparent 60%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:min(860px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      overflow:hidden;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(26px, 4vw, 36px);
      line-height:1.15;
    }

    .subtitle{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.45;
      font-size:15px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .pill{
      display:flex;
      align-items:center;
      gap:10px;
      padding:9px 12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      color:var(--muted);
      font-size:14px;
    }

    .progress{
      width:180px;
      height:8px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
    }

    .progress > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      transition:width .35s ease;
      border-radius:999px;
    }

    .stage{
      position:relative;
      min-height:520px;
    }

    .page{
      display:none;
      opacity:0;
      transform:translateY(18px) scale(.985);
      transition:opacity .35s ease, transform .35s ease;
    }

    .page.active{
      display:block;
      opacity:1;
      transform:translateY(0) scale(1);
      animation:fadeSlide .35s ease;
    }

    @keyframes fadeSlide{
      from{
        opacity:0;
        transform:translateY(18px) scale(.985);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .imgbox{
      width:100%;
      aspect-ratio:16/8;
      background:#222;
      border-radius:16px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.45);
    }

    .imgbox img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .question{
      margin:0 0 14px;
      font-size:clamp(20px, 3vw, 26px);
      line-height:1.25;
    }

    .answers{
      display:grid;
      gap:10px;
    }

    button{
      width:100%;
      padding:14px 16px;
      background:var(--btn);
      color:var(--text);
      border:none;
      border-radius:14px;
      cursor:pointer;
      text-align:left;
      font-size:16px;
      line-height:1.35;
      transition:
        background .18s ease,
        transform .08s ease,
        box-shadow .18s ease;
      box-shadow:0 4px 14px rgba(0,0,0,.12);
    }

    button:hover{
      background:var(--btnHover);
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    button:active{
      transform:translateY(1px);
    }

    .primary{
      background:linear-gradient(90deg, #76c442, #98da62);
      color:#10200a;
      font-weight:700;
      text-align:center;
    }

    .primary:hover{
      background:linear-gradient(90deg, #84d34d, #a4e66d);
    }

    .ghost{
      background:rgba(255,255,255,.06);
      text-align:center;
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .actions button{
      flex:1 1 180px;
    }

    .result-card{
      padding:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      line-height:1.55;
      font-size:16px;
    }

    .result-title{
      margin:0 0 12px;
      font-size:clamp(24px, 4vw, 32px);
    }

    .footer-note{
      margin-top:14px;
      color:var(--muted);
      font-size:14px;
      text-align:center;
    }

    @media (max-width: 640px){
      body{
        padding:12px;
      }

      .card{
        padding:16px;
      }

      .stage{
        min-height:unset;
      }

      .progress{
        width:120px;
      }

      .question{
        font-size:22px;
      }

      button{
        font-size:15px;
        padding:13px 14px;
      }

      .actions{
        flex-direction:column;
      }

      .actions button{
        flex:unset;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Кто ты из героев Шрека? 🧅</h1>
    <p class="subtitle">Отвечай честно. В конце узнаешь, кто ты.</p>

    <div class="topbar">
      <div class="pill">
        <span id="stepLabel">Старт</span>
        <div class="progress"><div id="progressFill"></div></div>
      </div>
      <div class="pill" id="hintLabel">Нажми «Начать тест»</div>
    </div>

    <div class="stage">
      <!-- START -->
      <section id="page-intro" class="page active">
        <div class="imgbox">
          <img src="images/cover.png" alt="Обложка теста"
               onerror="this.style.display='none'; this.parentElement.textContent='Добавь images/cover.png';">
        </div>
        <div class="result-card">
          <strong>Правила:</strong>
          <ul>
            <li>Выбери один вариант в каждом вопросе.</li>
            <li>Если будет ничья — выпадет смешанный результат.</li>
          </ul>
        </div>
        <div class="actions">
          <button class="primary" onclick="start()">Начать тест</button>
        </div>
      </section>

      <!-- QUESTIONS -->
      <div id="pages"></div>

      <!-- RESULT -->
      <section id="page-result" class="page">
        <div class="imgbox">
          <img id="resultImg" alt="Результат"
               onerror="this.style.display='none'; this.parentElement.textContent='Добавь картинку результата';">
        </div>
        <h2 id="resultTitle" class="result-title"></h2>
        <div id="resultText" class="result-card"></div>
        <div class="actions">
          <button class="primary" onclick="restart()">Пройти заново</button>
        </div>
        <div class="footer-note">Сохраняй достоинство, даже если ты Осёл.</div>
      </section>
    </div>
  </div>

<script>
  const questions = [
    {
      img:"images/01.png",
      text:"Как ты проводишь выходной?",
      answers:[
        {key:"A",text:"Один дома, никого не трогаю и кайфую"},
        {key:"B",text:"Делаю что-то полезное и держу всё под контролем"},
        {key:"C",text:"Звоню всем подряд и тащу их тусить"},
        {key:"D",text:"Красиво отдыхаю: кофе, эстетика, немного драмы"},
        {key:"E",text:"Думаю, как стать ещё лучше и круче"}
      ]
    },
    {
      img:"images/02.png",
      text:"Если что-то идёт не по плану, ты:",
      answers:[
        {key:"A",text:"Ворчу, но справляюсь сам"},
        {key:"B",text:"Беру ситуацию в руки"},
        {key:"C",text:"Паника + болтовня + всё равно как-то выкручусь"},
        {key:"D",text:"Делаю драматичное лицо и импровизирую"},
        {key:"E",text:"Я всё равно лучший(ая), просто обстоятельства против меня"}
      ]
    },
    {
      img:"images/03.png",
      text:"Как тебя описывают друзья?",
      answers:[
        {key:"A",text:"С виду суровый(ая), но внутри нормальный человек"},
        {key:"B",text:"Надёжный(ая)"},
        {key:"C",text:"Очень болтливый(ая), но любимый(ая)"},
        {key:"D",text:"Харизматичный(ая) и хитрый(ая)"},
        {key:"E",text:"Любит себя. Очень любит"}
      ]
    },
    {
      img:"images/04.png",
      text:"Твоя реакция на стресс:",
      answers:[
        {key:"A",text:"Уйти от всех и переждать"},
        {key:"B",text:"Собраться и действовать"},
        {key:"C",text:"Начать говорить. Много говорить"},
        {key:"D",text:"Сделать вид, что всё под контролем"},
        {key:"E",text:"Обвинить мир, судьбу и статистику"}
      ]
    },
    {
      img:"images/05.png",
      text:"Твоя главная суперсила:",
      answers:[
        {key:"A",text:"Независимость"},
        {key:"B",text:"Сила и характер"},
        {key:"C",text:"Энергия и общительность"},
        {key:"D",text:"Харизма и обаяние"},
        {key:"E",text:"Уверенность в себе"}
      ]
    }
  ];

  const results = {
    A:{
      title:"Ты — Шрек 🧅",
      text:"Ты ценишь личное пространство и не любишь лишний шум. С виду можешь казаться грубоватым(ой), но на самом деле ты надёжный(ая) и настоящий(ая). Если ты кого-то впускаешь в свой мир — это серьёзно."
    },
    B:{
      title:"Ты — Фиона 🗡️",
      text:"Ты сильная, собранная и умеешь справляться с любыми задачами. В тебе есть баланс между мягкостью и характером. Ты не ждёшь спасения — ты сама решаешь проблемы."
    },
    C:{
      title:"Ты — Осёл 🐴",
      text:"Ты энергия, шум и жизнь в одном флаконе. С тобой никогда не скучно, даже если ты иногда утомляешь окружающих. Ты тот самый человек, который вытаскивает других из тоски."
    },
    D:{
      title:"Ты — Кот в сапогах 🐱",
      text:"Ты харизматичный(ая), немного хитрый(ая) и очень обаятельный(ая). Умеешь нравиться людям и выходить из сложных ситуаций красиво. И да, драматичный взгляд — твоё оружие."
    },
    E:{
      title:"Ты — Принц Чарминг 👑",
      text:"Ты уверен(а) в себе и знаешь, чего хочешь. Иногда даже слишком. Но именно эта уверенность помогает тебе идти вперёд и не сомневаться."
    },
    MIX:{
      title:"Ты — весь «Шрек» сразу 🎭",
      text:"В тебе есть понемногу от каждого: и ворчание, и харизма, и энергия, и уверенность. Ты универсальный персонаж этой сказки — полный набор."
    }
  };

  const resultImages = {
    A:"images/shrek.png",
    B:"images/fiona.png",
    C:"images/donkey.png",
    D:"images/cat.png",
    E:"images/charming.png",
    MIX:"images/mix.png"
  };

  let counts = {A:0, B:0, C:0, D:0, E:0};
  let current = -1;

  const stepLabel = document.getElementById("stepLabel");
  const hintLabel = document.getElementById("hintLabel");
  const progressFill = document.getElementById("progressFill");

  function setProgress(step){
    if(step < 0){
      progressFill.style.width = "0%";
      stepLabel.textContent = "Старт";
      hintLabel.textContent = "Нажми «Начать тест»";
      return;
    }

    if(step < questions.length){
      const percent = Math.round((step / questions.length) * 100);
      progressFill.style.width = percent + "%";
      stepLabel.textContent = `Вопрос ${step + 1} из ${questions.length}`;
      hintLabel.textContent = "Выбери вариант";
      return;
    }

    progressFill.style.width = "100%";
    stepLabel.textContent = "Результат";
    hintLabel.textContent = "Вот кто ты";
  }

  function showOnly(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function start(){
    showQuestion(0);
  }

  function showQuestion(i){
    current = i;

    if(i >= questions.length){
      showResult();
      return;
    }

    setProgress(i);

    const q = questions[i];
    const container = document.getElementById("pages");

    container.innerHTML = `
      <section class="page active" id="question-page">
        <div class="imgbox">
          <img src="${q.img}" alt="Вопрос ${i+1}"
               onerror="this.style.display='none'; this.parentElement.textContent='Добавь ${q.img}';">
        </div>
        <h2 class="question">${q.text}</h2>
        <div class="answers">
          ${q.answers.map(a => `
            <button onclick="answer('${a.key}')">${a.text}</button>
          `).join("")}
        </div>
      </section>
    `;

    document.getElementById("page-intro").classList.remove("active");
    document.getElementById("page-result").classList.remove("active");
  }

  function answer(key){
    counts[key]++;
    const questionEl = document.getElementById("question-page");

    if(questionEl){
      questionEl.style.opacity = "0";
      questionEl.style.transform = "translateY(-8px) scale(.985)";
      setTimeout(() => {
        showQuestion(current + 1);
      }, 180);
    } else {
      showQuestion(current + 1);
    }
  }

  function showResult(){
    document.getElementById("pages").innerHTML = "";
    showOnly("page-result");
    setProgress(questions.length);

    const max = Math.max(...Object.values(counts));
    const winners = Object.keys(counts).filter(k => counts[k] === max);
    const key = winners.length === 1 ? winners[0] : "MIX";

    document.getElementById("resultTitle").innerText = results[key].title;
    document.getElementById("resultText").innerText = results[key].text;
    document.getElementById("resultImg").src = resultImages[key];
  }

  function restart(){
    counts = {A:0, B:0, C:0, D:0, E:0};
    current = -1;
    document.getElementById("pages").innerHTML = "";
    showOnly("page-intro");
    setProgress(-1);
  }

  setProgress(-1);
</script>
</body>
</html>
